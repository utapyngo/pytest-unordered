[tox]
envlist =
    {py38,py39,pypy38,pypy39}-{pytest7,pytest8},
    {py310,py311,py312,py313,py314,pypy310,pypy311}-{pytest7,pytest8,pytest9,pytestlatest,pytestmain},
    prek

[testenv]
commands =
  coverage run --branch --source=pytest_unordered -m pytest tests/ {posargs}
deps =
  coverage
  codecov
  pytest7: pytest>=7.4.4,<8
  pytest8: pytest>=8.1.1,<9
  pytest9: pytest>=9.1,<10
  pytestlatest: pytest
  pytestmain: git+https://github.com/pytest-dev/pytest.git@main

[testenv:prek]
skip_install = true
deps = prek
commands = prek run --all-files
